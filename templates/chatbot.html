<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Disaster Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🤖 AI Disaster Assistant</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/upload">Upload Report</a>
</nav>

<div class="hero">

    <h2>Ask the AI</h2>

    <input type="text" id="question" placeholder="Example: What should I do during a flood?">

    <br><br>

    <button onclick="askAI()">Ask AI</button>

    <br><br>

    <div id="answer" style="padding:20px;background:#f4f4f4;border-radius:8px;">
        AI response will appear here...
    </div>

</div>

<script>
function askAI(){

    let question=document.getElementById("question").value;

    let answer=document.getElementById("answer");

    if(question.toLowerCase().includes("flood")){

        answer.innerHTML=
        "<b>AI:</b><br>Move to higher ground immediately. Avoid walking or driving through flood water. Keep emergency contacts ready.";

    }

    else if(question.toLowerCase().includes("earthquake")){

        answer.innerHTML=
        "<b>AI:</b><br>Drop, Cover and Hold. Stay away from windows.";

    }

    else{

        answer.innerHTML=
        "<b>AI:</b><br>Please follow official government emergency guidelines and stay updated with local authorities.";

    }

}
</script>

</body>
</html>
